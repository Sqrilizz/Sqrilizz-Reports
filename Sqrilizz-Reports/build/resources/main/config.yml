# ═══════════════════════════════════════════════════════════════
#  Sqrilizz-Reports Configuration
#  Version: 7.6.1
#  Multi-version support: 1.8.9 - 1.21.11
# ═══════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════
# LANGUAGE SETTINGS
# ═══════════════════════════════════════════════════════════════
# Available: en (English), ru (Russian), ar (Arabic)
language: en

# ═══════════════════════════════════════════════════════════════
# REPORT SETTINGS
# ═══════════════════════════════════════════════════════════════
cooldown: 230
auto-ban-threshold: 8
anonymous-reports: false

# ═══════════════════════════════════════════════════════════════
# ANTI-ABUSE SYSTEM
# ═══════════════════════════════════════════════════════════════
report-limits:
  per-player: 3
  per-hour: 10
  false-report-threshold: 3

anti-abuse:
  enabled: true
  warning-threshold: 5
  temp-mute-threshold: 8
  temp-mute-duration: 300

# ═══════════════════════════════════════════════════════════════
# NAME CLEANING
# ═══════════════════════════════════════════════════════════════
name-cleaning:
  enabled: true
  remove-color-codes: true
  remove-hex-colors: true
  remove-formatting: true
  remove-reset-codes: true
  max-name-length: 16
  log-cleaning: false

# ═══════════════════════════════════════════════════════════════
# PERMISSIONS
# ═══════════════════════════════════════════════════════════════
permissions:
  admin: "reports.admin"
  bypass: "reports.bypass"
  reload: "reports.reload"
  language: "reports.language"
  telegram: "reports.telegram"

# ═══════════════════════════════════════════════════════════════
# TELEGRAM INTEGRATION
# ═══════════════════════════════════════════════════════════════
telegram:
  enabled: false
  token: ""
  chat_id: ""
  moderation:
    enabled: false
    admin_ids: []
    commands:
      ban: true
      kick: true
      mute: true
      warn: true

# ═══════════════════════════════════════════════════════════════
# DISCORD INTEGRATION
# ═══════════════════════════════════════════════════════════════
discord:
  enabled: false
  webhook_url: ""

discord-bot:
  enabled: false
  token: ""
  guild-id: ""
  channel-id: ""
  mod-roles: []
  status: "Watching reports 👀"
  moderation:
    enabled: false
    commands:
      ban: true
      kick: true
      mute: true
      warn: true

# ═══════════════════════════════════════════════════════════════
# DESIGN & COLORS
# ═══════════════════════════════════════════════════════════════
design:
  use-hex-colors: true
  colors:
    primary: "#FF6B6B"
    secondary: "#4ECDC4"
    success: "#45B7D1"
    warning: "#FFA726"
    error: "#EF5350"
    info: "#66BB6A"
    accent: "#AB47BC"

# ═══════════════════════════════════════════════════════════════
# REST API
# ═══════════════════════════════════════════════════════════════
rest-api:
  enabled: false
  port: 8971
  token: ""
  ip-whitelist:
    enabled: false
    list: []
  webhook:
    secret: ""
  rate-limit:
    rps: 10

# ═══════════════════════════════════════════════════════════════
# PERFORMANCE & CACHE
# ═══════════════════════════════════════════════════════════════
performance:
  cache:
    expire-after-write: 30
    maximum-size: 10000
    record-stats: false

# ═══════════════════════════════════════════════════════════════
# DATABASE
# ═══════════════════════════════════════════════════════════════
database:
  type: sqlite
  mysql:
    host: "localhost"
    port: 3306
    database: "sqrilizz_reports"
    user: "root"
    password: ""
    pool-size: 10
    params: "useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC"
