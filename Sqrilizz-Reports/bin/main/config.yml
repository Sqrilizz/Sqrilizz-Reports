cooldown: 230 #время в секундах

permission: "reports.admin" #право на получение жалоб
block-report-permission: "reports.bypass" #игрок с этим правом не может быть пожалован
config-reload-permission: "reports.reload" #право на перезагрузку config.yml
language-permission: "reports.language" #право на изменение языка

# Telegram settings
telegram:
  bot-token: "" # Токен вашего Telegram бота
  chat-id: "" # ID чата, куда будут отправляться уведомления

# Discord Webhook settings
webhook-url: "" # URL Discord Webhook для уведомлений
