name: Build & Release

on:
  push:
    branches: [master, main, develop]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Make Gradle wrapper executable
        run: chmod +x ./Sqrilizz-Reports/gradlew

      - name: Build with Gradle
        working-directory: ./Sqrilizz-Reports
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sqrilizz-Reports
          path: Sqrilizz-Reports/build/libs/Sqrilizz-Reports-*.jar
          if-no-files-found: error

      - name: Extract changelog for release
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          python3 << 'PYEOF'
          import re
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = r'^## \[' + re.escape('$VER') + r'\](.*?)(?=^## \[|\Z)'
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          if match:
              text = match.group(1).strip()
          else:
              text = 'Changelog section not found for version $VER'
          # Escape for GitHub Actions output
          text = text.replace('%', '%25').replace('\n', '%0A').replace('\r', '%0D')
          print(f'changelog={text}')
          PYEOF

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sqrilizz-Reports ${{ github.ref_name }}
          body: |
            ## Sqrilizz-Reports ${{ github.ref_name }}

            **Поддерживаемые версии:** 1.8.9 — 9.2 (Paper, Purpur, Pufferfish, Folia, Spigot)

            ### Изменения
            ${{ steps.changelog.outputs.changelog }}
          files: Sqrilizz-Reports/build/libs/Sqrilizz-Reports-*.jar
          generate_release_notes: true
